name: Generate Weekly Brief
on:
schedule:
- cron: '0 21 * * 0'
workflow_dispatch:
jobs:
generate:
runs-on: ubuntu-latest
steps:
- name: Checkout repo
        uses: actions/checkout@v4
- name: Set up Python
uses: actions/setup-python@v5
with:
python-version: '3.11'
- name: Install dependencies
run: pip install anthropic
- name: Generate brief
env:
ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
run: python scripts/generate_brief.py
- name: Commit and push
run: |
git config user.name "Impactvest Bot"
git config user.email "bot@impactvest.com"
git add data/
git diff --staged --quiet || git commit -m "Weekly brief $(date -u +%Y-
%m-%d)"
git push
